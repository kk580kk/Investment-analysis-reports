# .github/workflows/deploy.yml
# 投资分析报告阅读平台 - GitHub Pages 自动部署
#
# 触发条件：
#   1. push 到 main 分支
#   2. 手动触发（workflow_dispatch）
#
# 部署流程：
#   checkout 前端代码 → npm ci → 构建索引 →
#   npm run build → 提交 docs/ 到 main 分支（GitHub Pages 从 /docs 目录部署）

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# 并发控制：同一时间只运行一个部署
concurrency:
  group: pages
  cancel-in-progress: true

# 权限配置
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ============================================================
      # Step 1: 检出前端应用代码
      # ============================================================
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ============================================================
      # Step 2: 检出报告原始数据仓库
      #
      # 如果报告数据在同一仓库中（assets/reports/ 目录），
      # 则本步骤可删除，直接指定 --source 为当前仓库内路径。
      #
      # 如果报告数据在独立仓库中：
      #   1. 取消下方注释
      #   2. 配置 GitHub Personal Access Token (PAT)
      #   3. 在 Settings → Secrets and variables → Actions 中添加
      #      REPORTS_PAT（需 repo 权限）
      # ============================================================
      # - name: Checkout reports source
      #   uses: actions/checkout@v4
      #   with:
      #     repository: kk580kk/Investment-analysis-reports
      #     path: reports-source
      #     fetch-depth: 1
      #     # token: ${{ secrets.REPORTS_PAT }}

      # ============================================================
      # Step 3: 安装 Node.js
      # ============================================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # ============================================================
      # Step 4: 安装前端依赖
      # ============================================================
      - name: Install dependencies
        run: npm ci

      # ============================================================
      # Step 5: 构建报告索引
      #
      # 根据实际情况选择 --source 参数：
      #   - 同一仓库：--source .（或仓库内报告路径）
      #   - 独立报告仓库：--source ./reports-source
      #
      # 输出到 public/ 目录，Vite 构建时会自动打包到 dist/
      # ============================================================
      - name: Build report index
        run: |
          node scripts/build-index.js \
            --source . \
            --output ./public

      # ============================================================
      # Step 6: 构建 Vue SPA
      # ============================================================
      - name: Build Vue SPA
        run: npm run build

      # ============================================================
      # Step 7: 部署到 GitHub Pages (docs/ on main branch)
      # ============================================================
      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "deploy: ${{ github.sha }} [skip ci]"
          git push origin main